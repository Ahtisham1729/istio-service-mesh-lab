# DestinationRule: defines subsets (v1, v2) for the backend service
# Required for traffic splitting in the VirtualService to work
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: backend
  namespace: mesh-lab
spec:
  host: backend
  subsets:
    - name: v1
      labels:
        version: v1
    - name: v2
      labels:
        version: v2
