# VirtualService: routes external traffic from the Gateway to the frontend
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: frontend
  namespace: mesh-lab
spec:
  hosts:
    - "*"
  gateways:
    - mesh-lab-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: frontend
            port:
              number: 8080
