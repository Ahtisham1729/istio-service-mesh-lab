# VirtualService: fault injection on order-service
#
# EXPERIMENT: Uncomment the fault section to simulate failures
# This demonstrates how Istio can inject faults WITHOUT changing application code
#
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: order-service
  namespace: mesh-lab
spec:
  hosts:
    - order-service
  http:
    - route:
        - destination:
            host: order-service
            port:
              number: 8080
      # --- UNCOMMENT BELOW to inject faults ---
      # fault:
      #   delay:
      #     percentage:
      #       value: 50       # 50% of requests get delayed
      #     fixedDelay: 5s    # by 5 seconds
      #   abort:
      #     percentage:
      #       value: 10       # 10% of requests get a 503
      #     httpStatus: 503
      # timeout: 10s          # overall timeout for this route
      # retries:
      #   attempts: 3
      #   perTryTimeout: 3s
      #   retryOn: 5xx
