---
# Namespace is created by the install script with istio-injection=enabled
# These manifests assume namespace: mesh-lab

# ============================================================
# Frontend
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mesh-lab
  labels:
    app: frontend
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
      version: v1
  template:
    metadata:
      labels:
        app: frontend
        version: v1
    spec:
      containers:
        - name: frontend
          image: frontend:local
          ports:
            - containerPort: 8080
          env:
            - name: BACKEND_URL
              value: "http://backend.mesh-lab.svc.cluster.local:8080"
            - name: ORDER_URL
              value: "http://order-service.mesh-lab.svc.cluster.local:8080"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: mesh-lab
spec:
  selector:
    app: frontend
  ports:
    - port: 8080
      targetPort: 8080
      name: http

---
